name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  visit:
    runs-on: ubuntu-latest
    steps:
      - name: Visit Streamlit app with headless browser
        run: |
          pip install playwright
          playwright install chromium --with-deps
          python - <<'SCRIPT'
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  await page.goto(
                      "https://support-buddy.streamlit.app",
                      wait_until="networkidle",
                  )
                  print("Page loaded, keeping session for 30s...")
                  await asyncio.sleep(30)
                  print("Done – closing browser.")
                  await browser.close()

          asyncio.run(main())
          SCRIPT

  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Re-enable this workflow if GitHub auto-disabled it
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const wf = workflows.data.workflows.find(w => w.name === 'Keep Streamlit Alive');
            if (wf && wf.state === 'disabled_inactivity') {
              await github.rest.actions.enableWorkflow({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: wf.id,
              });
              console.log('Workflow was disabled by inactivity — re-enabled.');
            } else {
              console.log(`Workflow state: ${wf?.state ?? 'not found'} — no action needed.`);
            }
